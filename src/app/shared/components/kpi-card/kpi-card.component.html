<div class="glass-panel rounded-2xl overflow-hidden hover-lift group h-full flex flex-col">
  <div class="p-3 sm:p-4 relative flex-grow flex flex-col justify-center">
    <div [class]="'absolute -right-6 -top-6 w-20 h-20 rounded-full blur-2xl transition-all duration-500 group-hover:opacity-100 opacity-60 ' + iconBgClass"></div>
    
    <div class="flex items-center">
      <div [class]="'flex-shrink-0 rounded-xl p-2.5 shadow-lg bg-gradient-to-br ' + gradientClass + ' ' + shadowClass">
        <svg class="h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconSvgPath" />
        </svg>
      </div>
      <div class="ml-4 w-0 flex-1">
        <dt class="text-xs font-semibold text-slate-500 dark:text-slate-400 truncate">{{ title }}</dt>
        <dd class="flex items-baseline mt-1">
          <div *ngIf="isLoading" class="h-6 w-16 bg-slate-200 dark:bg-slate-700 rounded animate-pulse"></div>
          
          <ng-container *ngIf="!isLoading">
            <div class="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight flex items-center">
              <span *ngIf="hasError" class="text-amber-500 mr-2" title="Erreur API. Valeur par défaut affichée.">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
              </span>
              {{ formatNumberCompact(hasError ? 0 : value) }}
            </div>
            <span *ngIf="suffix && !hasError" class="ml-1 text-xs font-bold text-slate-400 dark:text-slate-500">{{ suffix }}</span>
          </ng-container>
        </dd>
      </div>
    </div>
  </div>
  
  <div *ngIf="actionButtonText && actionButtonRoute" class="bg-slate-50/50 dark:bg-slate-800/30 px-4 py-2 border-t border-slate-100 dark:border-slate-800 flex justify-end">
    <a [routerLink]="actionButtonRoute" class="text-[10px] uppercase tracking-wider font-bold text-indigo-600 hover:text-indigo-800 dark:text-indigo-400 dark:hover:text-indigo-300 flex items-center group/btn cursor-pointer">
      {{ actionButtonText }}
      <svg class="ml-1 w-3 h-3 transform group-hover/btn:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    </a>
  </div>
</div>
