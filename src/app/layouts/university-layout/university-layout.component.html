<div class="min-h-screen bg-slate-50 flex">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
    <!-- Logo Area -->
    <div class="h-16 flex items-center px-6 bg-slate-950 border-b border-slate-800">
      <div class="w-8 h-8 bg-purple-500 text-white rounded flex items-center justify-center font-bold mr-3">
        UA
      </div>
      <span class="font-bold text-lg tracking-wide">studCASH <span class="font-normal text-slate-400 text-sm">Uni</span></span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-3 space-y-1">
      <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Université</p>
      
      <a routerLink="/admin-university/dashboard" routerLinkActive="bg-slate-800 text-white" class="text-slate-300 hover:bg-slate-800 hover:text-white group flex items-center px-3 py-2 text-sm font-medium rounded-md transition-colors">
        <svg class="text-slate-400 group-hover:text-white mr-3 flex-shrink-0 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Vue Globale
      </a>

      <a routerLink="/admin-university/inscriptions" routerLinkActive="bg-slate-800 text-white" class="text-slate-300 hover:bg-slate-800 hover:text-white group flex items-center px-3 py-2 text-sm font-medium rounded-md transition-colors mt-2">
        <svg class="text-slate-400 group-hover:text-white mr-3 flex-shrink-0 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Nos Étudiants
      </a>

      <a routerLink="/admin-university/paiements" routerLinkActive="bg-slate-800 text-white" class="text-slate-300 hover:bg-slate-800 hover:text-white group flex items-center px-3 py-2 text-sm font-medium rounded-md transition-colors mt-2">
        <svg class="text-slate-400 group-hover:text-white mr-3 flex-shrink-0 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        Paiements Scolarité
      </a>

      <a routerLink="/admin-university/profile" routerLinkActive="bg-slate-800 text-white" class="text-slate-300 hover:bg-slate-800 hover:text-white group flex items-center px-3 py-2 text-sm font-medium rounded-md transition-colors mt-2">
        <svg class="text-slate-400 group-hover:text-white mr-3 flex-shrink-0 h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Mon Profil
      </a>
    </nav>

    <!-- User & Logout -->
    <div class="p-4 bg-slate-950 border-t border-slate-800">
      <div class="flex items-center">
        <div class="flex-shrink-0">
          <div class="h-8 w-8 rounded-full bg-slate-700 flex items-center justify-center text-sm font-medium">
            {{ (authService.currentUser$ | async)?.firstName?.charAt(0) || 'U' }}
          </div>
        </div>
        <div class="ml-3">
          <p class="text-sm font-medium text-white">{{ (authService.currentUser$ | async)?.firstName }}</p>
          <p class="text-xs font-medium text-purple-400 group-hover:text-purple-300">Admin Université</p>
        </div>
      </div>
      <button (click)="logout()" class="mt-4 w-full flex justify-center items-center px-4 py-2 border border-slate-700 rounded-md text-sm font-medium text-slate-300 hover:bg-slate-800 focus:outline-none transition-colors">
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Top header (Mobile only) -->
    <header class="bg-white shadow-sm md:hidden h-16 flex items-center justify-between px-4">
      <div class="font-bold text-lg text-slate-900">studCASH <span class="text-purple-600">Uni</span></div>
      <button class="text-slate-500 hover:text-slate-700">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </header>

    <!-- Content Area -->
    <div class="flex-1 overflow-auto bg-slate-50 p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
