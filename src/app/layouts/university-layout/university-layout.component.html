<div class="univ-portal-shell min-h-screen bg-slate-50 dark:bg-slate-950 flex font-sans">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex border-r border-white/5 shadow-2xl relative z-10">
    <!-- Subtle gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-b from-purple-500/5 to-indigo-500/5 pointer-events-none"></div>
    
    <!-- Logo Area -->
    <div class="h-20 flex items-center px-6 relative z-10">
      <img src="/logo-studcash.png" alt="studCASH Logo" class="h-10 w-auto mr-3">
      <span class="font-extrabold text-xl tracking-tight">studCASH <span class="font-medium text-slate-400 text-sm ml-1">Uni</span></span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-4 space-y-1 relative z-10 overflow-y-auto custom-scrollbar">
      <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Menu Principal</p>
      
      <a routerLink="/admin-university/dashboard" routerLinkActive="bg-white/10 text-white shadow-sm" [routerLinkActiveOptions]="{exact: true}" class="text-slate-400 hover:bg-white/5 hover:text-white group flex items-center px-3 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200">
        <svg class="text-slate-500 group-hover:text-purple-400 mr-3 flex-shrink-0 h-5 w-5 transition-colors" [class.text-purple-400]="router.url === '/admin-university/dashboard'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Vue Globale
      </a>

      <a routerLink="/admin-university/inscriptions" routerLinkActive="bg-white/10 text-white shadow-sm" class="text-slate-400 hover:bg-white/5 hover:text-white group flex items-center px-3 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 mt-1">
        <svg class="text-slate-500 group-hover:text-blue-400 mr-3 flex-shrink-0 h-5 w-5 transition-colors" [class.text-blue-400]="router.url.includes('/admin-university/inscriptions')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Nos Étudiants
      </a>

      <a routerLink="/admin-university/paiements" routerLinkActive="bg-white/10 text-white shadow-sm" class="text-slate-400 hover:bg-white/5 hover:text-white group flex items-center px-3 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 mt-1">
        <svg class="text-slate-500 group-hover:text-emerald-400 mr-3 flex-shrink-0 h-5 w-5 transition-colors" [class.text-emerald-400]="router.url.includes('/admin-university/paiements')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        Paiements Scolarité
      </a>

      <div class="pt-6 pb-2">
        <p class="px-3 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Configuration</p>
      </div>

      <a routerLink="/admin-university/parametres" routerLinkActive="bg-white/10 text-white shadow-sm" class="text-slate-400 hover:bg-white/5 hover:text-white group flex items-center px-3 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200">
        <svg class="text-slate-500 group-hover:text-amber-400 mr-3 flex-shrink-0 h-5 w-5 transition-colors" [class.text-amber-400]="router.url.includes('/admin-university/parametres')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Paramètres
      </a>

      <a routerLink="/admin-university/profile" routerLinkActive="bg-white/10 text-white shadow-sm" class="text-slate-400 hover:bg-white/5 hover:text-white group flex items-center px-3 py-2.5 text-sm font-semibold rounded-xl transition-all duration-200 mt-1">
        <svg class="text-slate-500 group-hover:text-indigo-400 mr-3 flex-shrink-0 h-5 w-5 transition-colors" [class.text-indigo-400]="router.url.includes('/admin-university/profile')" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Mon Profil
      </a>
    </nav>

    <!-- User & Logout -->
    <div class="p-4 relative z-10 m-4 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-md">
      <div class="flex items-center">
        <div class="flex-shrink-0">
          <div class="h-9 w-9 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-sm font-bold shadow-lg">
            {{ (authService.currentUser$ | async)?.firstName?.charAt(0) || 'U' }}
          </div>
        </div>
        <div class="ml-3 overflow-hidden">
          <p class="text-sm font-bold text-white truncate">{{ (authService.currentUser$ | async)?.firstName }}</p>
          <p class="text-[10px] font-semibold text-purple-400 uppercase tracking-wider">Admin Université</p>
        </div>
      </div>
      <button (click)="logout()" class="mt-4 w-full flex justify-center items-center px-4 py-2 border border-white/10 bg-white/5 rounded-xl text-sm font-semibold text-slate-300 hover:bg-white/10 hover:text-white hover:border-white/20 focus:outline-none transition-all duration-200">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden relative">
    <!-- Top header (Mobile only) -->
    <header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm md:hidden h-16 flex items-center justify-between px-4 border-b border-slate-200 dark:border-slate-800 z-20">
      <div class="flex items-center">
        <img src="/logo-studcash.png" alt="studCASH Logo" class="h-8 w-auto mr-2">
        <div class="font-extrabold text-lg text-slate-900 dark:text-white tracking-tight">studCASH <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600">Uni</span></div>
      </div>
      <button class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </header>

    <!-- Content Area -->
    <div class="flex-1 overflow-auto bg-slate-50/50 dark:bg-slate-950/50 p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
