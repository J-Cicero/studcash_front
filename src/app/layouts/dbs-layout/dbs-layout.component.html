<div class="min-h-screen bg-slate-50 flex">
  
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
    <!-- Logo Area -->
    <div class="h-16 flex items-center px-6 bg-slate-950 border-b border-slate-800">
      <div class="w-8 h-8 bg-blue-600 text-white rounded flex items-center justify-center font-bold mr-3">
        D
      </div>
      <span class="font-bold text-lg tracking-wide">DBS Portal</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-3 space-y-1">
      <p class="px-3 text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Direction Bourses</p>
      
      <a routerLink="/admin-dbs/dashboard" routerLinkActive="bg-white/10" class="flex items-center px-6 py-3 text-white/80 hover:bg-white/10 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Tableau de bord
      </a>

      <a routerLink="/admin-dbs/parametres" routerLinkActive="bg-white/10" class="flex items-center px-6 py-3 text-white/80 hover:bg-white/10 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
        Configurations DBS
      </a>

      <a routerLink="/admin-dbs/profile" routerLinkActive="bg-white/10" class="flex items-center px-6 py-3 text-white/80 hover:bg-white/10 hover:text-white transition-colors mt-2">
        <svg class="w-5 h-5 mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Mon Profil
      </a>
    </nav>

    <!-- User & Logout -->
    <div class="p-4 bg-slate-950 border-t border-slate-800">
      <div class="flex items-center">
        <div class="flex-shrink-0">
          <div class="h-8 w-8 rounded-full bg-slate-700 flex items-center justify-center text-sm font-medium">
            {{ (authService.currentUser$ | async)?.firstName?.charAt(0) || 'D' }}
          </div>
        </div>
        <div class="ml-3 flex-1">
          <p class="text-sm font-medium text-white">{{ (authService.currentUser$ | async)?.firstName }}</p>
          <p class="text-xs font-medium text-slate-400 group-hover:text-slate-300">Admin DBS</p>
        </div>
        <button (click)="themeService.toggleTheme()" class="ml-auto p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-full transition-colors" title="Changer le thème">
          <svg *ngIf="themeService.isDarkTheme$ | async" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <svg *ngIf="!(themeService.isDarkTheme$ | async)" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
      </div>
      <button (click)="logout()" class="mt-4 w-full flex justify-center items-center px-4 py-2 border border-slate-700 rounded-md text-sm font-medium text-slate-300 hover:bg-slate-800 focus:outline-none transition-colors">
        Déconnexion
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Top header (Mobile only) -->
    <header class="bg-white shadow-sm md:hidden h-16 flex items-center justify-between px-4">
      <div class="font-bold text-lg text-slate-900">DBS Portal</div>
    </header>

    <!-- Content Area -->
    <div class="flex-1 overflow-auto bg-slate-50 dark:bg-slate-900 transition-colors p-6">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
