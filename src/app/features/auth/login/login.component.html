<div class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
  <!-- Background Decoration -->
  <div class="absolute inset-0 z-0 overflow-hidden">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-blue-100 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-slate-200 rounded-full mix-blend-multiply filter blur-3xl opacity-70"></div>
  </div>

  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl z-10 p-8 border border-slate-100">
    <div class="text-center mb-8">
      <!-- Logo Placeholder -->
      <div class="flex justify-center mb-4">
        <div class="w-16 h-16 bg-slate-900 rounded-xl flex items-center justify-center shadow-lg">
          <span class="text-white font-bold text-2xl tracking-tighter">SC</span>
        </div>
      </div>
      <h2 class="text-2xl font-bold text-slate-900">Bienvenue sur studCASH</h2>
      <p class="text-sm text-slate-500 mt-2">Connectez-vous à votre espace sécurisé</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <!-- Email Field -->
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Adresse Email</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
            </svg>
          </div>
          <input id="email" type="email" formControlName="email" 
                 class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-slate-900 focus:border-slate-900 sm:text-sm placeholder-slate-400 transition-colors" 
                 placeholder="vous@exemple.com">
        </div>
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('required')" class="mt-1 text-sm text-red-500">
          L'email est obligatoire.
        </p>
        <p *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.hasError('email')" class="mt-1 text-sm text-red-500">
          Veuillez mettre un email valide.
        </p>
      </div>

      <!-- Password Field -->
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Mot de passe</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
            </svg>
          </div>
          <input id="password" type="password" formControlName="password" 
                 class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-slate-900 focus:border-slate-900 sm:text-sm placeholder-slate-400 transition-colors" 
                 placeholder="••••••••">
        </div>
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('required')" class="mt-1 text-sm text-red-500">
          Le mot de passe est obligatoire.
        </p>
        <p *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.hasError('minlength')" class="mt-1 text-sm text-red-500">
          Le mot de passe doit contenir au moins 6 caractères.
        </p>
      </div>

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" type="checkbox" class="h-4 w-4 text-slate-900 focus:ring-slate-900 border-slate-300 rounded">
          <label for="remember-me" class="ml-2 block text-sm text-slate-700">Se souvenir de moi</label>
        </div>
        <div class="text-sm">
          <a href="#" class="font-medium text-slate-900 hover:text-slate-700">Mot de passe oublié ?</a>
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="isLoading" 
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-colors disabled:opacity-70 disabled:cursor-not-allowed">
          <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading">Connexion...</span>
        </button>
      </div>
    </form>
  </div>
</div>
