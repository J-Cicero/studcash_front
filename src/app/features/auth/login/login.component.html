<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-blue-900 p-4">
  <div class="w-full max-w-md bg-white/10 backdrop-blur-lg rounded-2xl p-8 border border-white/20 shadow-2xl">
    
    <div class="text-center mb-8 flex flex-col items-center">
      <img src="/logo-studcash.png" alt="studCASH Logo" class="h-16 w-auto mb-4">
      <p class="text-blue-200">Connectez-vous à votre espace</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div *ngIf="errorMessage" class="p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-100 text-sm">
        {{ errorMessage }}
      </div>

      <div>
        <label class="block text-sm font-medium text-blue-100 mb-2">Identifiant</label>
        <input type="email" formControlName="email" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      </div>

      <div>
        <label class="block text-sm font-medium text-blue-100 mb-2">Mot de passe</label>
        <input type="password" formControlName="password" class="w-full px-4 py-3 rounded-lg bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
      </div>

      <button type="submit" [disabled]="isLoading" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
        <span *ngIf="!isLoading">Se connecter</span>
        <span *ngIf="isLoading">Connexion...</span>
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <a href="#" class="text-blue-300 hover:text-white text-sm">Mot de passe oublié ?</a>
    </div>
  </div>
</div>
