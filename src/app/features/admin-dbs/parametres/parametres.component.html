<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold text-gray-900">Configurations DBS (Règles des bourses)</h2>
    <button (click)="loadParametres()" class="btn-primary text-sm">Rafraîchir</button>
  </div>

  <div *ngIf="successMessage" class="p-4 bg-green-50 text-green-700 rounded-lg">
    {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="p-4 bg-red-50 text-red-700 rounded-lg">
    {{ errorMessage }}
  </div>

  <div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Règle</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Valeur Actuelle</th>
          <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
          <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        <tr *ngFor="let param of parametres">
          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
            {{ param.nomParametre }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <div *ngIf="editingParam?.nomParametre !== param.nomParametre">
              <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                {{ param.valeurParametre }}
              </span>
            </div>
            <div *ngIf="editingParam?.nomParametre === param.nomParametre">
              <input type="text" [(ngModel)]="editValue" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm">
            </div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            {{ param.description }}
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
            <button *ngIf="editingParam?.nomParametre !== param.nomParametre" (click)="startEdit(param)" class="text-indigo-600 hover:text-indigo-900">
              Modifier
            </button>
            <div *ngIf="editingParam?.nomParametre === param.nomParametre" class="flex justify-end space-x-2">
              <button (click)="saveEdit()" class="text-green-600 hover:text-green-900 font-bold" [disabled]="isLoading">Valider</button>
              <button (click)="cancelEdit()" class="text-gray-600 hover:text-gray-900" [disabled]="isLoading">Annuler</button>
            </div>
          </td>
        </tr>
        <tr *ngIf="parametres.length === 0 && !isLoading">
          <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">
            Aucun paramètre trouvé.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
