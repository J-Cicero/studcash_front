<div class="max-w-4xl space-y-8 animate-in slide-in-from-bottom duration-500">
  <!-- Profile Header -->
  <div class="flex items-end gap-6">
    <div class="w-32 h-32 rounded-3xl bg-[#14532d] flex items-center justify-center text-white shadow-lg shadow-[#14532d]/20 relative">
      <span class="text-4xl font-black">JD</span>
      <button class="absolute -bottom-2 -right-2 w-10 h-10 bg-white rounded-xl shadow-md border border-slate-100 flex items-center justify-center text-slate-400 hover:text-[#14532d] transition-colors">
        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a.996.996 0 0 0 0-1.41l-2.34-2.34a.996.996 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </button>
    </div>
    <div class="pb-2 flex-1">
      <h1 class="text-3xl font-black text-slate-800 tracking-tight">{{ agent.nom }}</h1>
      <p class="text-slate-500 font-medium">{{ agent.role }} — {{ agent.universite }}</p>
    </div>
    <div class="pb-2">
      <button (click)="logout()" 
              class="flex items-center gap-2 px-4 py-2 bg-red-50 text-red-600 rounded-xl font-bold text-sm hover:bg-red-600 hover:text-white transition-all">
        <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24">
          <path d="M10 17v-2h4v2h-4zm-4-1V8a2 2 0 0 1 2-2h6V4l4 4-4 4V9H8v7h4v2H8a2 2 0 0 1-2-2zm10 0h2v2h-2v-2z" />
        </svg>
        Déconnexion
      </button>
    </div>
  </div>

  <!-- Information Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Account Details -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-6">
      <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
        <svg class="w-5 h-5 text-[#14532d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Détails du compte
      </h3>
      
      <div class="space-y-4">
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Email Professionnel</label>
          <p class="text-slate-700 font-semibold">{{ agent.email }}</p>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Service / Département</label>
          <p class="text-slate-700 font-semibold">{{ agent.service }}</p>
        </div>
        <div>
          <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Dernière Connexion</label>
          <p class="text-slate-700 font-semibold">{{ agent.derniereConnexion }}</p>
        </div>
      </div>
    </div>

    <!-- Security Settings -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-6">
      <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
        <svg class="w-5 h-5 text-[#14532d]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        Sécurité & Accès
      </h3>
      
      <div class="space-y-4">
        <div class="p-4 bg-slate-50 rounded-xl border border-slate-100">
          <p class="text-sm text-slate-600 mb-4">Votre mot de passe a été modifié pour la dernière fois il y a 3 mois.</p>
          <button (click)="changePassword()" 
                  class="w-full bg-white border border-slate-200 text-[#14532d] py-2.5 rounded-lg text-sm font-black hover:bg-slate-50 transition-all shadow-sm">
            Changer le mot de passe
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
