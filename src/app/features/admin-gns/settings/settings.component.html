<div class="space-y-8 animate-in fade-in duration-500">
  <div>
    <h1 class="text-3xl font-black text-slate-800 tracking-tight uppercase leading-none">Configuration Système</h1>
    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mt-3">Paramètres globaux de la plateforme GNS</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- General Parameters -->
    <div class="lg:col-span-2 space-y-6">
      <div class="bg-white rounded-[3rem] p-10 shadow-sm border border-slate-100">
        <h3 class="text-[10px] font-black text-[#1e3a8a] uppercase tracking-[0.4em] mb-10 flex items-center gap-3">
          <div class="w-1.5 h-1.5 rounded-full bg-[#1e3a8a]"></div>
          Paramètres Financiers
        </h3>
        
        <div class="space-y-8">
          <div *ngFor="let param of globalParams" class="group">
            <label class="block text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-3 ml-2 group-focus-within:text-[#1e3a8a] transition-colors">{{ param.label }}</label>
            <input [type]="param.type" 
                   [value]="param.value"
                   class="w-full bg-slate-50 border-none rounded-2xl py-4 px-6 text-sm font-black text-slate-700 focus:bg-white focus:ring-4 focus:ring-blue-900/5 transition-all outline-none">
          </div>
        </div>

        <button class="mt-12 bg-[#1e3a8a] text-white px-10 py-5 rounded-3xl font-black text-[10px] uppercase tracking-[0.3em] shadow-2xl shadow-blue-900/40 hover:scale-[1.02] active:scale-95 transition-all w-full">
          Sauvegarder les modifications
        </button>
      </div>
    </div>

    <!-- Universities & Nodes -->
    <div class="space-y-6">
      <div class="bg-[#0f172a] rounded-[3.5rem] p-10 shadow-2xl text-white relative overflow-hidden group">
        <div class="absolute top-[-10%] right-[-10%] w-32 h-32 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-all"></div>
        
        <h3 class="text-[10px] font-black text-blue-300/50 uppercase tracking-[0.4em] mb-10">Status des Nœuds</h3>
        
        <div class="space-y-6">
          <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5 group-hover:border-white/10 transition-all">
            <div class="flex items-center gap-4">
              <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.5)]"></div>
              <span class="text-xs font-black uppercase tracking-widest leading-none">Univ. Lomé (UL)</span>
            </div>
            <span class="text-[9px] font-black text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-lg">ONLINE</span>
          </div>
          
          <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5">
            <div class="flex items-center gap-4">
              <div class="w-2 h-2 rounded-full bg-amber-500 shadow-[0_0_12px_rgba(245,158,11,0.5)]"></div>
              <span class="text-xs font-black uppercase tracking-widest leading-none">Univ. Kara (UK)</span>
            </div>
            <span class="text-[9px] font-black text-amber-400 bg-amber-500/10 px-2 py-1 rounded-lg">MAINTENANCE</span>
          </div>
        </div>

        <button class="mt-10 w-full py-4 bg-white/5 border border-white/10 rounded-2xl text-[9px] font-black uppercase tracking-[0.3em] hover:bg-white/10 transition-all">
          Gérer les partenariats
        </button>
      </div>
    </div>
  </div>
</div>
