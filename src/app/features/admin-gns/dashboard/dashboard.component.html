<div class="mb-6 animate-fade-in-up">
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
    <div>
      <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Dashboard Admin</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Vue d'ensemble du réseau GNS</p>
    </div>
    
    <!-- Reference Counters Header -->
    <div *ngIf="!isLoadingStats && stats" class="mt-4 md:mt-0 flex space-x-6 bg-white dark:bg-slate-900 px-6 py-2.5 rounded-full shadow-sm border border-slate-100 dark:border-slate-800">
      <div class="flex items-center space-x-2">
        <div class="w-2 h-2 rounded-full bg-blue-500"></div>
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300">{{ stats.totalUniversities }} Univ.</span>
      </div>
      <div class="flex items-center space-x-2">
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300">{{ stats.totalStudents }} Étu.</span>
      </div>
      <div class="flex items-center space-x-2">
        <div class="w-2 h-2 rounded-full bg-purple-500"></div>
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300">{{ stats.totalBoutiques }} Bout.</span>
      </div>
    </div>
  </div>
</div>

<!-- Active Year Banner -->
<div *ngIf="activeYear" class="mb-6 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-700 p-[2px] relative overflow-hidden shadow-sm">
  <div class="absolute inset-0 bg-white/10 dark:bg-white/5 backdrop-blur-sm"></div>
  <div class="relative bg-white dark:bg-slate-900 rounded-lg px-4 py-3 flex flex-col sm:flex-row items-center justify-between">
    <div class="flex items-center mb-2 sm:mb-0">
      <div class="relative flex h-2.5 w-2.5 mr-3">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
      </div>
      <div>
        <p class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Année Scolaire</p>
        <h2 class="text-sm font-extrabold text-slate-900 dark:text-white tracking-tight">{{ activeYear.libelle }}</h2>
      </div>
    </div>
  </div>
</div>

<!-- KPI Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
  <!-- Total Étudiants -->
  <app-kpi-card
    title="Total Étudiants"
    [value]="totalEtudiants"
    [isLoading]="isTotalEtudiantsLoading"
    [hasError]="totalEtudiantsError"
    iconSvgPath="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
    gradientClass="from-blue-500 to-blue-600"
    iconBgClass="bg-blue-500/10"
    shadowClass="shadow-blue-500/30"
    actionButtonText="Versement Étu."
    actionButtonRoute="/admin-gns/versements-etudiants"
  ></app-kpi-card>



  <!-- Boutiques Alerte Quota -->
  <app-kpi-card
    title="Alerte Quota Bout."
    [value]="lowQuotaBoutiques"
    [isLoading]="isLowQuotaBoutiquesLoading"
    [hasError]="lowQuotaBoutiquesError"
    iconSvgPath="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
    gradientClass="from-amber-400 to-orange-500"
    iconBgClass="bg-amber-500/10"
    shadowClass="shadow-orange-500/30"
    actionButtonText="Versement Bout."
    actionButtonRoute="/admin-gns/versements-boutiques"
  ></app-kpi-card>

  <!-- Liquidations en Attente -->
  <app-kpi-card
    title="Liquidations Attente"
    [value]="pendingLiquidations"
    [isLoading]="isPendingLiquidationsLoading"
    [hasError]="pendingLiquidationsError"
    iconSvgPath="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
    gradientClass="from-purple-500 to-indigo-600"
    iconBgClass="bg-purple-500/10"
    shadowClass="shadow-purple-500/30"
  ></app-kpi-card>
</div>

<!-- Charts Section -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">



</div>
