<div class="space-y-8 animate-in fade-in duration-500">
  <!-- Welcome Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-black text-slate-800 tracking-tight leading-none uppercase">Intelligence Dashboard</h1>
      <p class="text-slate-400 text-[10px] font-black uppercase tracking-[0.3em] mt-3">GNS Central Operations • Monitoring en temps réel</p>
    </div>
    <div class="px-6 py-3 bg-white rounded-2xl shadow-sm border border-slate-100 flex items-center gap-3">
      <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
      <span class="text-[10px] font-black uppercase tracking-widest text-slate-600">Système Opérationnel</span>
    </div>
  </div>

  <!-- KPI Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col gap-4 hover:shadow-md transition-all group">
      <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">Total Étudiants</p>
      <div class="flex items-end justify-between">
        <p class="text-5xl font-black text-slate-800 tracking-tighter">1,250</p>
        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-[#1e3a8a]">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </div>
      </div>
    </div>

    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col gap-4 hover:shadow-md transition-all group">
      <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.4em]">En attente KYC</p>
      <div class="flex items-end justify-between">
        <p class="text-5xl font-black text-slate-800 tracking-tighter">45</p>
        <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
      </div>
    </div>

    <div class="bg-[#1e3a8a] p-8 rounded-[2.5rem] shadow-2xl shadow-blue-900/30 flex flex-col gap-4 hover:-translate-y-1 transition-all">
      <p class="text-[10px] font-black text-white/30 uppercase tracking-[0.4em]">Volume Bourses</p>
      <div class="flex items-end justify-between">
        <p class="text-4xl font-black text-white tracking-tighter">15.0M <span class="text-xs opacity-50 ml-1">FCFA</span></p>
        <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-white">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts & Alerts -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
      <div class="flex items-center justify-between mb-10">
        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em]">Flux d'Inscriptions</h3>
        <span class="text-[10px] font-black text-[#1e3a8a] bg-blue-50 px-3 py-1 rounded-full uppercase tracking-widest">7 derniers jours</span>
      </div>
      <div class="h-[280px]">
        <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType"></canvas>
      </div>
    </div>

    <div class="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 flex flex-col">
      <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-10">Alertes KYC Critiques</h3>
      <div class="space-y-4 flex-1">
        <div *ngFor="let alert of alerts" class="flex items-center justify-between p-6 bg-slate-50/50 rounded-[2rem] border border-slate-100 group hover:bg-white hover:shadow-xl hover:shadow-blue-900/5 transition-all cursor-pointer">
          <div class="flex items-center gap-5">
            <div class="w-12 h-12 rounded-[1.25rem] bg-white flex items-center justify-center text-[#1e3a8a] shadow-sm font-black group-hover:bg-[#1e3a8a] group-hover:text-white transition-all">
              {{ alert.name.charAt(0) }}
            </div>
            <div>
              <p class="text-sm font-black text-slate-800 tracking-tight">{{ alert.name }}</p>
              <p class="text-[9px] text-red-500 font-black uppercase tracking-widest mt-1">{{ alert.reason }}</p>
            </div>
          </div>
          <button class="w-10 h-10 rounded-2xl bg-white flex items-center justify-center text-slate-300 hover:text-[#1e3a8a] hover:rotate-90 shadow-sm transition-all duration-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
