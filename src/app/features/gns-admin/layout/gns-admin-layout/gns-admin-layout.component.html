<div class="flex h-screen overflow-hidden text-on-surface antialiased">
    <!-- SideNavBar -->
    <aside class="fixed left-0 top-0 h-full w-[240px] bg-primary dark:bg-inverse-surface flex flex-col py-6 px-4 z-50">
        <div class="mb-10 px-4">
            <div class="flex items-center gap-3">
                <img alt="StudCash GNS Logo" class="w-8 h-8 invert" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCOJTwmLxaqJgFUCnpxKqwJK10s-EiEu9kxhw2ZeoQkbj8gwlgz97ASX8gn6p3jj0gHli5qu0UfSU3vee38OMvcLGXNZ6yu6BKa5AbD0oBYy16tSsjqYWJoWEAbxorp-uOAXrKIBXaRDUD0ViDKAjamETUXqdErsIwca0IahAuW-YK78rfhXd7drngvfbazKqQULcQKDfb5SiYEQtIg-FSbEKiynsFp-j5-DtSc3iACIeAcoCxtQ7HfHWe8yu_fhxhOktLFIJR40zzt"/>
                <div>
                    <h1 class="font-headline-sm text-headline-sm font-bold text-on-primary dark:text-inverse-on-surface leading-none">StudCash GNS</h1>
                    <p class="font-label-md text-label-md text-primary-fixed-dim/70 uppercase tracking-widest mt-1">Super Admin</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 space-y-1 custom-scrollbar overflow-y-auto">
            <!-- Router links -->
            <a routerLink="/admin/dashboard" routerLinkActive="bg-on-primary-fixed-variant text-on-primary scale-[0.98]" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-secondary-fixed-dim hover:text-on-primary hover:bg-on-primary-fixed-variant/50 transition-colors rounded-xl">
                <i class="pi pi-home text-xl"></i>
                <span class="font-label-md text-label-md">Dashboard</span>
            </a>
            <a routerLink="/admin/mass-actions" routerLinkActive="bg-on-primary-fixed-variant text-on-primary scale-[0.98]" class="flex items-center gap-3 px-4 py-3 text-secondary-fixed-dim hover:text-on-primary hover:bg-on-primary-fixed-variant/50 transition-colors rounded-xl">
                <i class="pi pi-bolt text-xl"></i>
                <span class="font-label-md text-label-md">Mass Actions</span>
            </a>
            <a routerLink="/admin/wallets" routerLinkActive="bg-on-primary-fixed-variant text-on-primary scale-[0.98]" class="flex items-center gap-3 px-4 py-3 text-secondary-fixed-dim hover:text-on-primary hover:bg-on-primary-fixed-variant/50 transition-colors rounded-xl">
                <i class="pi pi-wallet text-xl"></i>
                <span class="font-label-md text-label-md">Wallets Monitor</span>
            </a>
            <a routerLink="/admin/universities" routerLinkActive="bg-on-primary-fixed-variant text-on-primary scale-[0.98]" class="flex items-center gap-3 px-4 py-3 text-secondary-fixed-dim hover:text-on-primary hover:bg-on-primary-fixed-variant/50 transition-colors rounded-xl">
                <i class="pi pi-building text-xl"></i>
                <span class="font-label-md text-label-md">Universities</span>
            </a>
            <a routerLink="/admin/students" routerLinkActive="bg-on-primary-fixed-variant text-on-primary scale-[0.98]" class="flex items-center gap-3 px-4 py-3 text-secondary-fixed-dim hover:text-on-primary hover:bg-on-primary-fixed-variant/50 transition-colors rounded-xl">
                <i class="pi pi-users text-xl"></i>
                <span class="font-label-md text-label-md">Students</span>
            </a>
            <a routerLink="/admin/transactions" routerLinkActive="bg-on-primary-fixed-variant text-on-primary scale-[0.98]" class="flex items-center gap-3 px-4 py-3 text-secondary-fixed-dim hover:text-on-primary hover:bg-on-primary-fixed-variant/50 transition-colors rounded-xl">
                <i class="pi pi-receipt text-xl"></i>
                <span class="font-label-md text-label-md">Transactions</span>
            </a>
            <a routerLink="/admin/settings" routerLinkActive="bg-on-primary-fixed-variant text-on-primary scale-[0.98]" class="flex items-center gap-3 px-4 py-3 text-secondary-fixed-dim hover:text-on-primary hover:bg-on-primary-fixed-variant/50 transition-colors rounded-xl">
                <i class="pi pi-cog text-xl"></i>
                <span class="font-label-md text-label-md">Settings</span>
            </a>
        </nav>
        <div class="mt-auto pt-6 border-t border-on-primary/10">
            <button class="w-full flex items-center justify-center gap-2 bg-on-primary-fixed text-primary px-4 py-3 rounded-xl font-label-md text-label-md hover:bg-white transition-colors">
                <i class="pi pi-file text-xl"></i>
                Generate Report
            </button>
        </div>
    </aside>
    <!-- Main Content Area -->
    <main class="ml-[240px] flex-1 flex flex-col min-w-0 h-full overflow-y-auto bg-background relative">
        <!-- TopNavBar -->
        <header class="flex justify-between items-center w-full px-gutter h-16 bg-surface-container-lowest dark:bg-surface-dim border-b border-outline-variant dark:border-outline shadow-sm sticky top-0 z-40">
            <div class="flex items-center gap-6">
                <div class="relative">
                    <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-outline"></i>
                    <input class="pl-10 pr-4 py-2 bg-surface-container-low border-none rounded-xl text-body-md font-body-md w-80 focus:ring-2 focus:ring-primary/20" placeholder="Rechercher un étudiant, une transaction..." type="text"/>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <nav class="hidden lg:flex items-center gap-6">
                    <a routerLink="/admin/settings" class="text-on-surface-variant font-medium font-body-md hover:text-primary transition-opacity opacity-80 cursor-pointer">Settings</a>
                    <a class="text-on-surface-variant font-medium font-body-md hover:text-primary transition-opacity opacity-80" href="#">Support</a>
                    <a class="text-on-surface-variant font-medium font-body-md hover:text-primary transition-opacity opacity-80" href="#">Logs</a>
                </nav>
                <div class="h-6 w-[1px] bg-outline-variant"></div>
                <div class="flex items-center gap-4">
                    <button class="text-outline hover:text-primary transition-colors relative">
                        <i class="pi pi-bell text-xl"></i>
                        <span class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
                    </button>
                    <button class="text-outline hover:text-primary transition-colors">
                        <i class="pi pi-question-circle text-xl"></i>
                    </button>
                    <div class="flex items-center gap-3 pl-2 border-l border-outline-variant">
                        <img alt="User Profile" class="w-8 h-8 rounded-full object-cover border border-outline-variant" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBOldKdZpKjB7xzbDF_t6tDKfRKujIaEOnQHpcyZ9kIkpYFzWpu24O2qilhuBaF6HnMQ3d_XkPqkqzcqsltN799bdY8aFK3nRr9ucdCtYCjOFJ2MZ3_H_pqnYxS8IfxmVTnWs11p7Pd_vajv7jr4oGOeGn0GJwiX89kgkJdi2zJkgr3W5HUA_nBVepjJIXoswNe6XlHEnt7aBhWn3MDG8zcCZck4894vcVk7t8nK-i_gxJM-yjVn4VrRT3X-9wJTEBt8HUljIOicsR"/>
                        <div class="text-right hidden sm:block">
                            <p class="text-body-sm font-bold text-on-surface leading-none">Jean Dupont</p>
                            <p class="text-label-sm text-outline">Super Admin</p>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Router Outlet -->
        <router-outlet></router-outlet>
        
        <!-- Floating Action Button - Contextual -->
        <div class="fixed bottom-8 right-8 z-50">
            <button class="group flex items-center gap-3 bg-primary text-on-primary p-4 rounded-full shadow-2xl hover:bg-on-primary-fixed-variant transition-all transform hover:scale-105">
                <i class="pi pi-plus text-xl"></i>
                <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 font-label-md whitespace-nowrap">Nouveau Ticket</span>
            </button>
        </div>
    </main>
</div>
