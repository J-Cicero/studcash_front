<div class="flex h-screen overflow-hidden bg-[var(--bg-main)] text-[var(--text-main)] antialiased font-sans">
    <!-- SideNavBar -->
    <aside class="fixed left-0 top-0 h-full w-[260px] bg-white border-r border-[var(--border-color)] flex flex-col py-6 px-5 z-50 shadow-sm transition-all duration-300">
        <div class="mb-10 flex items-center gap-4 px-2">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary to-primary-fixed-variant text-white flex items-center justify-center font-bold text-xl shadow-md">
                SC
            </div>
            <div class="flex flex-col">
                <span class="text-on-surface font-bold tracking-wider text-sm uppercase">StudCash</span>
                <span class="text-primary text-[10px] font-semibold uppercase tracking-widest mt-0.5">Admin GNS</span>
            </div>
        </div>
        <nav class="flex-1 space-y-1.5 custom-scrollbar overflow-y-auto pr-2">
            <!-- Router links -->
            <a routerLink="/admin/dashboard" routerLinkActive="bg-primary/10 text-primary font-medium" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-home text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Dashboard</span>
            </a>
            <a routerLink="/admin/mass-actions" routerLinkActive="bg-primary/10 text-primary font-medium" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-bolt text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Mass Actions</span>
            </a>
            <a routerLink="/admin/wallets" routerLinkActive="bg-primary/10 text-primary font-medium" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-wallet text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Wallets Monitor</span>
            </a>
            <a routerLink="/admin/universities" routerLinkActive="bg-primary/10 text-primary font-medium" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-building text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Universities</span>
            </a>
            <a routerLink="/admin/students" routerLinkActive="bg-primary/10 text-primary font-medium" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-users text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Students</span>
            </a>
            <a routerLink="/admin/transactions" routerLinkActive="bg-primary/10 text-primary font-medium" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-receipt text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Transactions</span>
            </a>
            <a routerLink="/admin/users" routerLinkActive="bg-primary/10 text-primary font-medium" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-users text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Users &amp; Roles</span>
            </a>
            <a routerLink="/admin/settings" routerLinkActive="bg-primary/10 text-primary font-medium" class="flex items-center gap-3 px-4 py-3 text-secondary hover:text-primary hover:bg-surface-container-low transition-all duration-200 rounded-xl group btn-interactive">
                <i class="pi pi-cog text-[20px] group-hover:scale-110 transition-transform"></i>
                <span class="font-label-md text-[13px]">Settings</span>
            </a>
        </nav>
        <div class="mt-auto pt-6 border-t border-[var(--border-color)]">
            <button class="w-full flex items-center justify-center gap-2 bg-primary/5 text-primary border border-primary/20 px-4 py-3 rounded-xl font-label-md text-sm hover:bg-primary hover:text-white transition-all btn-interactive shadow-sm">
                <i class="pi pi-file-export text-[18px]"></i>
                Générer Rapport
            </button>
        </div>
    </aside>
    <!-- Main Content Area -->
    <main class="ml-[260px] flex-1 flex flex-col min-w-0 h-full overflow-y-auto relative bg-[var(--bg-main)]">
        <!-- TopNavBar (Premium Floating Style) -->
        <div class="px-8 pt-8 pb-4 sticky top-0 z-40">
            <header class="flex justify-between items-center w-full px-8 py-4 bg-white/90 backdrop-blur-2xl border border-slate-200/60 rounded-2xl shadow-sm transition-all">
                
                <!-- Ergonomic Search Bar (Left aligned) -->
                <div class="flex-1 flex justify-start max-w-xl">
                    <div class="relative w-full group">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                            <i class="pi pi-search text-slate-400 group-focus-within:text-primary transition-colors text-lg"></i>
                        </div>
                        <input class="block w-full pl-12 pr-16 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 placeholder:text-slate-400 focus:bg-white focus:border-primary/50 focus:ring-4 focus:ring-primary/10 transition-all duration-300 outline-none" placeholder="Rechercher un étudiant, wallet, transaction..." type="text"/>
                        <div class="absolute inset-y-0 right-0 flex items-center pr-2">
                            <kbd class="hidden sm:inline-flex items-center gap-1 px-2 py-1 bg-white border border-slate-200 rounded-md shadow-sm text-[10px] font-bold text-slate-400 uppercase">
                                <i class="pi pi-apple text-[10px]"></i> K
                            </kbd>
                        </div>
                    </div>
                </div>

                <!-- Right Actions & Profile -->
                <div class="flex items-center justify-end gap-5 ml-auto">
                    <button class="relative flex items-center justify-center w-10 h-10 rounded-full bg-slate-50 border border-slate-200 text-slate-500 hover:text-primary hover:bg-primary/5 hover:border-primary/20 transition-all duration-300">
                        <i class="pi pi-bell text-lg"></i>
                        <!-- Dot only appears when there's an actual notification (mocked as hidden here) -->
                        <span class="hidden absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    
                    <div class="flex items-center gap-3 pl-5 border-l border-slate-200 cursor-pointer group">
                        <div class="text-right hidden sm:block">
                            <p class="text-sm font-bold text-slate-800 leading-tight group-hover:text-primary transition-colors">Administrateur GNS</p>
                            <p class="text-[11px] text-slate-500 font-medium">Superviseur</p>
                        </div>
                        <div class="relative w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-900 to-purple-800 shadow-sm group-hover:shadow-md transition-all duration-300 transform group-hover:scale-105 flex items-center justify-center border border-white">
                            <span class="font-bold text-sm text-white">AD</span>
                        </div>
                    </div>
                </div>
            </header>
        </div>

        <!-- Router Outlet -->
        <div class="p-8">
            <router-outlet></router-outlet>
        </div>
        
        <!-- Floating Action Button - Contextual -->
        <div class="fixed bottom-8 right-8 z-50">
            <button class="group flex items-center gap-3 bg-primary text-white p-4 rounded-full shadow-lg hover:shadow-xl hover:bg-primary-fixed-variant transition-all duration-300 transform hover:-translate-y-1">
                <i class="pi pi-plus text-xl"></i>
                <span class="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 font-semibold text-sm whitespace-nowrap">Nouveau Ticket</span>
            </button>
        </div>
    </main>
</div>
