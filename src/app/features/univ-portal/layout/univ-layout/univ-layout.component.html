<div class="univ-portal-shell bg-slate-50 text-gray-900 min-h-screen" [class.dark-mode]="isDarkMode()">
    <!-- TopAppBar (Premium Floating) -->
    <div class="px-8 pt-8 pb-4 sticky top-0 z-50 ml-0 md:ml-[220px]">
        <header class="flex justify-between items-center w-full px-6 py-4 bg-white/80 backdrop-blur-2xl border border-slate-200/60 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all">
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-900 to-blue-600 hidden md:block">Portail Université</span>
                <span class="hidden md:inline-flex items-center px-3 py-1 rounded-full text-[11px] font-semibold uppercase tracking-widest bg-blue-50 text-blue-900 border border-blue-100">
                    {{ currentRole() || 'ROLE' }}
                </span>
            </div>
            
            <!-- Ergonomic Centered Search -->
            <div class="flex-1 flex justify-center max-w-2xl w-full mx-4">
                <div class="relative w-full group">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <i class="pi pi-search text-slate-400 group-focus-within:text-blue-900 transition-colors"></i>
                    </div>
                    <input class="block w-full pl-11 pr-16 py-3 bg-slate-50/50 hover:bg-slate-100/50 border border-slate-200 rounded-2xl text-sm text-slate-700 placeholder:text-slate-400 focus:bg-white focus:border-blue-900/30 focus:ring-4 focus:ring-blue-900/10 transition-all duration-300 shadow-sm" placeholder="Rechercher étudiant, matricule..." type="text"/>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-3">
                        <kbd class="hidden sm:inline-flex items-center gap-1 px-2 py-1 bg-white border border-slate-200 rounded shadow-sm text-[10px] font-bold text-slate-400">
                            <i class="pi pi-apple text-[8px]"></i> K
                        </kbd>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <app-theme-toggle themeKey="univ-portal-theme" bodyClass="univ-portal-dark"></app-theme-toggle>
                <button class="relative flex items-center justify-center w-10 h-10 rounded-full bg-slate-50 border border-slate-200 text-slate-500 hover:text-blue-900 hover:bg-blue-50 transition-all shadow-sm">
                    <i class="pi pi-bell"></i>
                    <span class="hidden absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="w-10 h-10 rounded-full bg-blue-100 overflow-hidden border border-blue-200 shadow-sm cursor-pointer hover:shadow-md transition-all">
                    <img alt="User profile photo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDr2yRMnVNvMvZzGlI9KAcDPS-QcBeC5jcZ_Vc7JY9l0vtlPOOPKqnFrO0faYMu9ziSUEDkNV00m2jLLwgjY_IOXK4RbvHehcKcTypAQ9tH1W31cD1cgA5WIiHIvl4aclosx_gzXfsQ6QjWJ9qJhB2PeyQXexISKpfDvpQVjHCbw-OLT1zVlleAlH_D2-gcT5Vatj-0kuzPqBNyBo3LJJlQqk9MjFbZ80zXhjDHCtkS3yGcVkaLgL6NmbWs7VaokN2HVql3an5qoC3z"/>
                </div>
                <button (click)="logout()" class="relative flex items-center justify-center w-10 h-10 rounded-full bg-rose-50 border border-rose-200 text-rose-500 hover:text-white hover:bg-rose-500 transition-all shadow-sm ml-1" title="Déconnexion">
                    <i class="pi pi-power-off text-lg"></i>
                </button>
            </div>
        </header>
    </div>
    
    <!-- SideNavBar (Desktop Only) -->
    <aside class="hidden md:flex fixed left-0 top-0 w-[220px] h-full z-40 bg-white border-r border-slate-200 flex-col py-8 px-5 space-y-2 shadow-sm">
        <div class="mb-10 px-2 flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-900 to-blue-700 rounded-xl flex items-center justify-center shadow-md">
                <i class="pi pi-graduation-cap text-white text-xl"></i>
            </div>
            <div>
                <h2 class="font-bold text-lg text-slate-800 leading-tight">StudCash</h2>
                <p class="text-[10px] text-blue-900 font-bold uppercase tracking-widest">Université</p>
            </div>
        </div>
        <nav class="space-y-1.5 flex-1 overflow-y-auto custom-scrollbar">
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-900 hover:bg-blue-50/80 rounded-xl transition-all cursor-pointer group" routerLink="/univ/dashboard" routerLinkActive="!bg-blue-50 !text-blue-900 !font-bold" [routerLinkActiveOptions]="{exact: true}">
                <i class="pi pi-th-large text-lg group-hover:scale-110 transition-transform"></i>
                <span class="font-medium text-[13px]">Vue d'ensemble</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-900 hover:bg-blue-50/80 rounded-xl transition-all cursor-pointer group" routerLink="/univ/registrations" routerLinkActive="!bg-blue-50 !text-blue-900 !font-bold">
                <i class="pi pi-verified text-lg group-hover:scale-110 transition-transform"></i>
                <span class="font-medium text-[13px]">État Inscriptions</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-900 hover:bg-blue-50/80 rounded-xl transition-all cursor-pointer group" routerLink="/univ/portfolio" routerLinkActive="!bg-blue-50 !text-blue-900 !font-bold">
                <i class="pi pi-wallet text-lg group-hover:scale-110 transition-transform"></i>
                <span class="font-medium text-[13px]">Portefeuille</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-900 hover:bg-blue-50/80 rounded-xl transition-all cursor-pointer group" routerLink="/univ/transactions" routerLinkActive="!bg-blue-50 !text-blue-900 !font-bold">
                <i class="pi pi-receipt text-lg group-hover:scale-110 transition-transform"></i>
                <span class="font-medium text-[13px]">Transactions</span>
            </a>
        </nav>
        <div class="mt-auto pt-6 border-t border-slate-200">
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-xl transition-all cursor-pointer group" routerLink="/univ/settings" routerLinkActive="!bg-slate-100 !text-slate-900 !font-bold">
                <i class="pi pi-cog text-lg group-hover:rotate-90 transition-transform duration-300"></i>
                <span class="font-medium text-[13px]">Paramètres</span>
            </a>
            <button (click)="logout()" class="flex w-full items-center gap-3 px-4 py-3 mt-2 text-rose-500 hover:text-white hover:bg-rose-500 rounded-xl transition-all cursor-pointer group">
                <i class="pi pi-power-off text-lg group-hover:scale-110 transition-transform duration-300"></i>
                <span class="font-medium text-[13px]">Déconnexion</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="pb-20 md:pb-12 px-6 md:ml-[220px] max-w-7xl mx-auto">
        <router-outlet></router-outlet>
    </main>
    
    <!-- BottomNavBar (Mobile Only) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 h-16 flex items-center justify-around z-50">
        <button class="flex flex-col items-center gap-1 text-blue-900">
            <i class="pi pi-th-large text-[20px]"></i>
            <span class="text-[10px] font-bold">Aperçu</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-500" routerLink="/univ/registrations">
            <i class="pi pi-verified text-[20px]"></i>
            <span class="text-[10px] font-medium">Inscr.</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-500" routerLink="/univ/transactions">
            <i class="pi pi-receipt text-[20px]"></i>
            <span class="text-[10px] font-medium">Transac.</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-gray-500" routerLink="/univ/settings">
            <i class="pi pi-user text-[20px]"></i>
            <span class="text-[10px] font-medium">Profil</span>
        </button>
    </nav>
</div>
