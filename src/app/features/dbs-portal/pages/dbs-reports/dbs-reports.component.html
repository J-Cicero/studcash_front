<div class="min-h-screen bg-[#F8FAFC] font-['Inter',sans-serif] p-10 space-y-10">
    <header class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-3xl font-black text-slate-800 uppercase tracking-tight">Rapports & Statistiques</h1>
            <p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mt-2">Bilan consolidé par établissement</p>
        </div>
        <div class="flex gap-4">
            <!-- Les boutons d'exportation seront ajoutés lorsque l'API les supportera -->
        </div>
    </header>

    <div class="bg-white rounded-[3rem] border border-slate-100 shadow-2xl shadow-indigo-200/40 overflow-hidden">
        <p-table [value]="univStats()" styleClass="p-datatable-lg" [loading]="isLoading()">
            <ng-template pTemplate="header">
                <tr>
                    <th pSortableColumn="code">Code <p-sortIcon field="code"></p-sortIcon></th>
                    <th pSortableColumn="nom">Université <p-sortIcon field="nom"></p-sortIcon></th>
                    <th pSortableColumn="nbEtudiants" class="text-right">Total Étudiants <p-sortIcon field="nbEtudiants"></p-sortIcon></th>
                    <th class="text-right">Eligibles <p-sortIcon field="nbEligibles"></p-sortIcon></th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-stat>
                <tr>
                    <td class="px-10 py-8">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-600 flex items-center justify-center text-white font-black text-sm shadow-lg shadow-indigo-100">
                            {{ stat.code }}
                        </div>
                    </td>
                    <td class="px-10 py-8 font-black text-slate-700 text-lg tracking-tight">{{ stat.nom }}</td>
                    <td class="px-10 py-8 text-right font-black text-slate-800">{{ stat.nbEtudiants | number }}</td>
                    <td class="px-10 py-8 text-right">
                        <span class="text-emerald-600 font-black text-lg">{{ stat.nbEligibles | number }}</span>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="footer">
                <tr class="bg-slate-900 text-white">
                    <td colspan="2" class="px-10 py-6 font-black uppercase tracking-widest text-xs">Total des établissements : {{ univStats().length }}</td>
                    <td class="px-10 py-6 text-right font-black text-xl"></td>
                    <td class="px-10 py-6 text-right"></td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>
