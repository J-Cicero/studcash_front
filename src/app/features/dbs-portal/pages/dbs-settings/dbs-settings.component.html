<div class="animate-fade-in-up font-['Inter',sans-serif] p-10 bg-[#F8FAFC] min-h-screen space-y-10">
    <header class="flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-black text-slate-800 uppercase tracking-tight leading-none">Mon Profil DBS</h1>
            <p class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mt-2">Gestion des accès administratifs</p>
        </div>
    </header>

    <div class="bg-white rounded-[3rem] border border-slate-100 shadow-2xl shadow-indigo-200/50 overflow-hidden max-w-4xl">
        <div class="p-12 bg-slate-50/50 border-b border-slate-50 flex items-center gap-10">
            @if(isLoading()) { <p-skeleton shape="circle" size="6rem"></p-skeleton> }
            @else {
                <div class="w-24 h-24 rounded-3xl bg-indigo-600 flex items-center justify-center text-white font-black text-4xl shadow-xl shadow-indigo-200 ring-8 ring-white">
                    {{ profile()?.nom?.charAt(0) }}
                </div>
            }
            <div class="space-y-2">
                @if(isLoading()) { <p-skeleton width="200px" height="2rem"></p-skeleton> }
                @else {
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">{{ profile()?.prenom }} {{ profile()?.nom }}</h2>
                    <div class="flex items-center gap-3">
                        <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[9px] font-black uppercase tracking-widest border border-indigo-100">ADMIN_DBS</span>
                        <span class="text-[10px] font-bold text-slate-400">ID: {{ profile()?.trackingId?.substring(0,8) }}</span>
                    </div>
                }
            </div>
        </div>

        <div class="p-12 grid grid-cols-1 md:grid-cols-2 gap-10">
            <div class="space-y-2">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] ml-1">Email Officiel</label>
                <input class="w-full bg-slate-50 border-none rounded-2xl py-4 px-6 font-bold text-sm text-slate-400 italic cursor-not-allowed" readonly [value]="profile()?.email">
            </div>
            <div class="space-y-2">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-[0.3em] ml-1">Téléphone</label>
                <input class="w-full bg-slate-50 border-none rounded-2xl py-4 px-6 font-bold text-sm text-slate-800 focus:bg-white focus:ring-4 focus:ring-indigo-100 transition-all outline-none" [value]="profile()?.telephone">
            </div>
            
            <div class="col-span-full pt-10 border-t border-slate-50 flex justify-between items-center">
                <p class="text-[10px] font-medium text-slate-400 italic">Dernière mise à jour : 23 Mai 2026</p>
                <button pButton label="Sauvegarder les modifications" icon="pi pi-check"
                        class="p-button-primary rounded-2xl font-black text-xs uppercase tracking-widest py-4 px-8 shadow-xl shadow-indigo-100"></button>
            </div>
        </div>
    </div>
</div>
