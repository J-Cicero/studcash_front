<div class="bg-background text-on-surface min-h-screen" [class.dark-mode]="isDarkMode()">
    <!-- TopAppBar Shell (Premium Floating) -->
    <div class="px-8 pt-8 pb-4 sticky top-0 z-50">
        <header class="flex justify-between items-center w-full px-8 py-5 max-w-7xl mx-auto bg-white/80 backdrop-blur-2xl border border-slate-200/60 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] transition-all">
            <div class="flex items-center gap-4">
                <img src="/logo-studcash.png" alt="StudCash" class="w-10 h-10 rounded-xl shadow-sm object-cover bg-white" />
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-purple-600">StudCash DBS</span>
                <span class="hidden sm:inline px-2 py-1 bg-purple-50 text-purple-700 text-[10px] font-bold rounded-md tracking-widest uppercase">Bourses</span>
            </div>
            
            <nav class="hidden md:flex gap-2 items-center bg-slate-50/50 p-1.5 rounded-2xl border border-slate-100">
                <a routerLink="/dbs/dossiers" routerLinkActive="!bg-white !text-primary !shadow-sm !font-bold" class="px-4 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-primary hover:bg-white/60 transition-all cursor-pointer">Dossiers (Étudiants)</a>
                <a routerLink="/dbs/ia-rules" routerLinkActive="!bg-white !text-primary !shadow-sm !font-bold" class="px-4 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-primary hover:bg-white/60 transition-all cursor-pointer flex items-center gap-1.5"><i class="pi pi-sparkles text-xs"></i> Critères</a>
                <a routerLink="/dbs/reports" routerLinkActive="!bg-white !text-primary !shadow-sm !font-bold" class="px-4 py-2 rounded-xl text-sm font-medium text-slate-500 hover:text-primary hover:bg-white/60 transition-all cursor-pointer">Rapports</a>
            </nav>
            
            <div class="flex items-center gap-4">
                <button class="relative flex items-center justify-center w-11 h-11 rounded-full bg-slate-50 border border-slate-200 text-slate-500 hover:text-primary hover:bg-primary/5 transition-all shadow-sm">
                    <i class="pi pi-bell text-lg"></i>
                    <span class="hidden absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>
                <div class="hidden sm:block">
                    <app-theme-toggle themeKey="dbs-theme" bodyClass="dbs-dark"></app-theme-toggle>
                </div>
                <div class="flex items-center gap-3 pl-4 border-l border-slate-200 cursor-pointer group">
                    <div class="hidden sm:block text-right">
                        <p class="text-sm font-bold text-slate-800 group-hover:text-primary transition-colors">Directeur DBS</p>
                    </div>
                    <div class="w-11 h-11 rounded-full bg-slate-100 flex items-center justify-center border border-slate-200 shadow-inner group-hover:border-purple-300 transition-all overflow-hidden">
                        <i class="pi pi-user text-slate-500 text-xl group-hover:text-purple-600 transition-colors"></i>
                    </div>
                </div>
                <button (click)="logout()" class="relative flex items-center justify-center w-11 h-11 rounded-full bg-rose-50 border border-rose-200 text-rose-500 hover:text-white hover:bg-rose-500 transition-all shadow-sm ml-2" title="Déconnexion">
                    <i class="pi pi-power-off text-lg"></i>
                </button>
            </div>
        </header>
    </div>

    <main class="max-w-7xl mx-auto px-8 py-8">
        <router-outlet></router-outlet>
    </main>
</div>
