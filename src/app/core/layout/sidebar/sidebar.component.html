<aside class="w-64 h-screen bg-[#14532d] flex flex-col fixed left-0 top-0 z-50 shadow-xl font-sans">
  <!-- Header / Brand -->
  <div class="p-8 flex items-center gap-3">
    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
      <span class="text-[#14532d] font-black italic text-xl">sC</span>
    </div>
    <div class="flex flex-col">
      <span class="text-white font-bold text-lg tracking-tight">studCash</span>
      <span class="text-white/60 text-[10px] uppercase tracking-widest font-semibold">Portail UL</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 mt-4 space-y-4">
    <a *ngFor="let item of navigation"
       [routerLink]="item.route"
       routerLinkActive="active"
       class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-200 group nav-link text-white/70 hover:bg-white/10 hover:text-white">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
        <path [attr.d]="item.icon" />
      </svg>
      <span class="font-semibold text-sm">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Bottom Actions -->
  <div class="p-4 border-t border-white/10 space-y-2">
    <button (click)="onLogout()" 
            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-200 bg-red-500/10 hover:bg-red-500/20 transition-all duration-200">
      <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
        <path d="M10 17v-2h4v2h-4zm-4-1V8a2 2 0 0 1 2-2h6V4l4 4-4 4V9H8v7h4v2H8a2 2 0 0 1-2-2zm10 0h2v2h-2v-2z" />
      </svg>
      <span class="font-bold text-sm">Déconnexion</span>
    </button>
  </div>
</aside>
