<aside class="fixed left-0 top-0 h-full flex flex-col p-4 z-50 bg-primary w-64 border-r border-outline-variant">
  <div class="mb-8 flex flex-col gap-2">
    <span class="font-headline-lg text-on-primary">studCash</span>
    <span class="font-body-md text-on-primary opacity-70">Portail Partenaire UL</span>
  </div>
  
  <nav class="flex-1 flex flex-col gap-2">
    <a *ngFor="let item of navigation"
       (click)="switchTab(item.id)"
       class="flex items-center gap-4 px-4 py-2 rounded-lg cursor-pointer transition-colors duration-150 ease-in-out"
       [ngClass]="currentTab === item.id ? 'bg-primary-container text-on-primary-container' : 'text-on-primary opacity-70 hover:bg-white/10 hover:opacity-100'">
      <span class="material-symbols-outlined">{{ item.icon }}</span>
      <span class="font-body-md">{{ item.label }}</span>
    </a>
  </nav>
  
  <div class="mt-auto border-t border-white/20 pt-4 flex flex-col gap-2">
    <a class="flex items-center gap-4 px-4 py-2 text-on-primary opacity-70 hover:bg-white/10 hover:opacity-100 transition-colors rounded-lg cursor-pointer">
      <span class="material-symbols-outlined">help</span>
    </a>
    <button class="flex items-center gap-4 px-4 py-2 text-[#ba1a1a] bg-[#ba1a1a]/10 hover:bg-[#ba1a1a] hover:text-white rounded-lg transition-all mt-2 w-full text-left">
      <span class="material-symbols-outlined">logout</span>
    </button>
  </div>
</aside>
