<header class="flex justify-between items-center px-8 py-4 h-20 bg-surface border-b border-outline-variant sticky top-0 z-40 w-full">
  <h1 class="font-headline-lg text-primary">{{ title }}</h1>
  
  <div class="flex items-center gap-6">
    <div class="relative focus-within:ring-2 ring-primary rounded-full transition-all">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-outline material-symbols-outlined">search</span>
      <input class="pl-12 pr-4 py-2 bg-surface-container border-none rounded-full w-64 font-label-md focus:outline-none" placeholder="Rechercher..." type="text"/>
    </div>
    <div class="flex gap-4">
      <button class="p-2 hover:bg-surface-container-high transition-all rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-on-surface-variant">notifications</span>
      </button>
      <button class="p-2 hover:bg-surface-container-high transition-all rounded-full flex items-center justify-center">
        <span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
      </button>
    </div>
  </div>
</header>
