<header class="h-20 bg-white border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-40 font-sans">
  <!-- Search Section -->
  <div class="flex-1 max-w-xl">
    <div class="relative group">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-[#14532d] transition-colors">
        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>
      </span>
      <input type="text" 
             placeholder="Rechercher un étudiant..." 
             class="w-full bg-slate-50 border border-slate-200 rounded-xl py-2.5 pl-12 pr-4 outline-none focus:bg-white focus:border-[#14532d] focus:ring-4 focus:ring-[#14532d]/5 transition-all text-sm text-slate-700">
    </div>
  </div>

  <!-- User Section -->
  <div class="flex items-center gap-6">
    <button class="relative p-2 text-slate-400 hover:text-slate-600 transition-colors">
      <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
      </svg>
      <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
    </button>
    
    <div class="h-8 w-[1px] bg-slate-100"></div>

    <div class="flex items-center gap-4">
      <div class="text-right hidden sm:block">
        <p class="text-sm font-bold text-slate-800 leading-none">{{ agentName }}</p>
        <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mt-1">{{ agentRole }}</p>
      </div>
      <div class="w-10 h-10 bg-[#14532d]/10 rounded-xl flex items-center justify-center text-[#14532d]">
        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
      </div>
    </div>
  </div>
</header>
